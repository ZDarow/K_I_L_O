# pre-commit конфигурация для KiloCode/Kilo
# Установка: pre-commit install
# Проверка всех файлов: pre-commit run --all-files
#
# pre-commit.ci (GitHub App):
#   Автоматически исправляет линтеры на PR
#   Включено: trailing-whitespace, end-of-file-fixer, mixed-line-ending

ci:
  autofix_prs: true
  autofix_commit_msg: "chore: авто-исправление pre-commit"
  autoupdate_schedule: monthly
  autoupdate_commit_msg: "chore: авто-обновление pre-commit хуков"
  skip:
    - mypy              # может требовать дополнительных зависимостей
    - markdownlint       # требует Node.js 22+
    - gitleaks           # требует установки gitleaks
    - gitlint            # проверяет только новые коммиты (не все файлы)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-json
      - id: check-toml
      - id: check-ast
        files: \.py$
      - id: detect-private-key
      - id: check-docstring-first
        files: \.py$
      - id: debug-statements
        files: \.py$
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        args: ["-x", "-Calways"]
        files: \.(sh|bash|bats)$

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: ["-w", "-i", "2", "-bn", "-ci"]
        files: \.(sh|bash|bats)$

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.49.0
    hooks:
      - id: markdownlint
        args: ["--config", ".markdownlint.yml", "--ignore", "node_modules", "--ignore", ".kilo", "--ignore", ".config", "--ignore", "src/kilo-config"]
        files: \.md$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: \.py$
      - id: ruff-format
        files: \.py$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [--no-error-summary, --ignore-missing-imports]
        files: \.py$
        additional_dependencies: []

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: ["--skip=.git,.venv,.kilo,src/kilo-config,ble-project,node_modules", "--ignore-words-list=ist,nam,ser,cantact"]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ["-r", "--configfile", ".bandit"]
        files: \.py$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint
        args: ["--ignore", "M1,B6", "--msg-filename"]
