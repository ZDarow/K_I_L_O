name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  packages: write  # для docker build/push

jobs:
  lint-shell:
    name: Линтинг shell-скриптов
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Проверка shell-скриптов
        run: |
          echo "=== Проверка install.sh ==="
          shellcheck -x -Calways install.sh
          echo "=== Проверка src/ ==="
          shellcheck -x -Calways src/bashrc-append.sh src/profile-append.sh
          echo "=== Проверка tests/ ==="
          shellcheck -x -Calways tests/*.bats
          echo "=== Проверка ble-project/scripts/ ==="
          for f in ble-project/scripts/setup-env.sh ble-project/scripts/activate.sh; do
            if [ -f "$f" ]; then
              shellcheck -x -Calways "$f"
            else
              echo "  [!] $f не найден, пропускаем"
            fi
          done

  lint-yaml:
    name: Линтинг YAML-файлов
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка uv и yamllint
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv sync --frozen

      - name: Проверка YAML-файлов
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          echo "=== yamllint ==="
          find . \
            -not -path './.git/*' \
            -not -path './.kilo/node_modules/*' \
            -not -path './.config/*' \
            -not -path './.venv/*' \
            -not -path './ble-project/.venv/*' \
            \( -name '*.yml' -o -name '*.yaml' \) \
            -print0 | xargs -0 .venv/bin/yamllint -c .yamllint.yml

  lint-markdown:
    name: Линтинг Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка markdownlint
        run: npm install -g markdownlint-cli

      - name: Проверка Markdown
        run: |
          markdownlint --ignore node_modules --ignore .kilo --ignore .config --ignore src/kilo-config --ignore .git --config .markdownlint.yml '**/*.md'

  lint-actions:
    name: Линтинг GitHub Actions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка actionlint
        run: |
          curl -sSL https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz | tar xz -C /usr/local/bin actionlint
          chmod +x /usr/local/bin/actionlint

      - name: Проверка workflow файлов
        run: |
          echo "=== actionlint ==="
          actionlint -color

  test-python:
    name: Python-тесты (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Синхронизация зависимостей
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv sync --frozen

      - name: Запуск pytest
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run pytest tests/test_gui.py -v --tb=short

  test-bash:
    name: Тестирование bash-скриптов (bats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка bats
        uses: mig4/setup-bats@v1
        with:
          bats-version: 1.11.1

      - name: Установка shellcheck (для тестов)
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Запуск тестов
        run: bats tests/

  dry-run-install:
    name: Сухой прогон установки
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Установка зависимостей
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 git curl

      - name: Установка uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Сухой прогон
        run: bash install.sh --dry-run --skip-preflight

  check-system:
    name: Pre-flight проверка
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pre-flight проверка
        run: bash install.sh --check

  check-manifest-sync:
    name: Проверка синхронизации src/kilo-config и .kilo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Сравнение src/kilo-config/ и .kilo/
        run: |
          errors=0
          for f in $(find src/kilo-config -not -path '*/node_modules/*' -not -name 'package-lock.json' -type f | sed 's|^src/kilo-config/||' | sort); do
            src="src/kilo-config/$f"
            kilo=".kilo/$f"
            if [ ! -f "$kilo" ]; then
              echo "❌ ONLY_IN_SRC: $f"
              errors=$((errors + 1))
            elif ! diff -q "$src" "$kilo" >/dev/null 2>&1; then
              echo "❌ DIFF: $f"
              errors=$((errors + 1))
            fi
          done
          for f in $(find .kilo -not -path './.kilo/node_modules/*' -not -name 'package-lock.json' -type f | sed 's|^.kilo/||' | sort); do
            if [ ! -f "src/kilo-config/$f" ]; then
              echo "ℹ️ ONLY_IN_DOTKILO: $f (dev-only)"
            fi
          done
          echo "---"
          if [ "$errors" -eq 0 ]; then
            echo "✅ Все файлы синхронизированы"
          else
            echo "❌ Найдено $errors расхождений"
            exit 1
          fi

  lint-secrets:
    name: Проверка секретов (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка gitleaks
        run: |
          curl -sSL https://github.com/zricethezav/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz | tar xz -C /usr/local/bin gitleaks

      - name: Проверка git-истории на утечки секретов
        run: gitleaks git --no-color --verbose

  docker-install-test:
    name: Docker-тест установки
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Сборка Docker-образа
        run: docker build -f docker/Dockerfile -t kilo-test .

      - name: Тестирование установки
        run: |
          echo "=== Запуск make install && make verify в Docker ==="
          docker run --rm kilo-test bash -c '
            set -euo pipefail
            cd /opt/kilo
            echo "--- Установка uv ---"
            curl -LsSf https://astral.sh/uv/install.sh | sh
            export PATH="$HOME/.local/bin:$PATH"
            echo "--- make install ---"
            bash install.sh --skip-preflight 2>&1 | tail -20
            echo "--- make verify ---"
            bash install.sh --verify 2>&1 | tail -20
            echo "--- Проверка Kilo CLI ---"
            npx --yes kilo --version 2>&1 || {
              echo "::warning::Kilo CLI не установлен — проверь npm и @kilocode/cli"
              exit 1
            }
          '

      - name: Очистка
        if: always()
        run: docker rmi kilo-test 2>/dev/null || true
