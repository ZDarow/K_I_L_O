name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  lint-shell:
    name: Линтинг shell-скриптов
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Проверка shell-скриптов
        run: |
          echo "=== Проверка install.sh ==="
          shellcheck -x install.sh || true
          echo "=== Проверка uninstall.sh ==="
          shellcheck -x uninstall.sh || true
          echo "=== Проверка scripts/ ==="
          shellcheck -x scripts/*.sh || true
          echo "=== Проверка src/ ==="
          shellcheck -x src/bashrc-append.sh src/profile-append.sh || true

  lint-yaml:
    name: Линтинг YAML-файлов
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка yamllint
        run: pip3 install --user yamllint

      - name: Проверка YAML-файлов
        run: |
          echo "=== yamllint ==="
          find . -not -path './.git/*' -not -path './.kilo/node_modules/*' -not -path './.config/*' -name '*.yml' -o -name '*.yaml' | xargs -r ~/.local/bin/yamllint -c .yamllint.yml 2>&1 || true

  lint-markdown:
    name: Линтинг Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка markdownlint
        run: npm install -g markdownlint-cli

      - name: Проверка Markdown
        run: |
          markdownlint --ignore node_modules --ignore .kilo --ignore .config --ignore src/dot-kilo --ignore .git --config .markdownlint.yml '**/*.md' 2>&1 || true

  test-bash:
    name: Тестирование bash-скриптов (bats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка bats
        run: |
          git clone https://github.com/bats-core/bats-core.git /tmp/bats
          cd /tmp/bats
          sudo ./install.sh /usr/local
          bats --version

      - name: Установка shellcheck (для тестов)
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Запуск тестов
        run: bats tests/ || true

  dry-run-install:
    name: Сухой прогон установки
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Установка зависимостей
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 git curl bluez || true

      - name: Сухой прогон
        run: bash install.sh --dry-run --skip-preflight

  check-manifest-sync:
    name: Проверка синхронизации src/dot-kilo и .kilo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Сравнение src/dot-kilo/ и .kilo/
        run: |
          errors=0
          for f in $(find src/dot-kilo -not -path '*/node_modules/*' -not -name 'package-lock.json' -type f | sed 's|^src/dot-kilo/||' | sort); do
            src="src/dot-kilo/$f"
            kilo=".kilo/$f"
            if [ ! -f "$kilo" ]; then
              echo "❌ ONLY_IN_SRC: $f"
              errors=$((errors + 1))
            elif ! diff -q "$src" "$kilo" >/dev/null 2>&1; then
              echo "❌ DIFF: $f"
              errors=$((errors + 1))
            fi
          done
          for f in $(find .kilo -not -path './.kilo/node_modules/*' -not -name 'package-lock.json' -type f | sed 's|^.kilo/||' | sort); do
            if [ ! -f "src/dot-kilo/$f" ]; then
              echo "ℹ️ ONLY_IN_DOTKILO: $f (dev-only)"
            fi
          done
          echo "---"
          if [ "$errors" -eq 0 ]; then
            echo "✅ Все файлы синхронизированы"
          else
            echo "❌ Найдено $errors расхождений"
            exit 1
          fi
